site_name: OpenVox Documentation
site_description: Documentation for the OpenVox Puppet distribution
site_url: https://mikeharp.com/openvox-docs/
repo_url: https://github.com/OpenVoxProject/openvox-docs
repo_name: OpenVoxProject/openvox-docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - tables
  - fenced_code
  - attr_list
  - def_list

nav:
  - Home: index.md
  - Puppet:
    - Overview: puppet/index.md
    - Configuration: puppet/configuration.md
    - Resource Types: puppet/type.md
    - Functions: puppet/function.md
    - Core Facts: puppet/core_facts.md
    - Static Catalogs: puppet/static_catalogs.md
    - CLI Reference: puppet/cli.md
    - Complete Resource Example: puppet/complete_resource_example.md
    - Services (Device): puppet/services_device.md
    - Scheduled Tasks (Windows): puppet/resources_scheduled_task_windows.md
    - Man Pages:
      - Overview: puppet/man/index.md
      - puppet-agent: puppet/man/agent.md
      - puppet-apply: puppet/man/apply.md
      - puppet-catalog: puppet/man/catalog.md
      - puppet-config: puppet/man/config.md
      - puppet-describe: puppet/man/describe.md
      - puppet-device: puppet/man/device.md
      - puppet-doc: puppet/man/doc.md
      - puppet-epp: puppet/man/epp.md
      - puppet-facts: puppet/man/facts.md
      - puppet-filebucket: puppet/man/filebucket.md
      - puppet-generate: puppet/man/generate.md
      - puppet-help: puppet/man/help.md
      - puppet-key: puppet/man/key.md
      - puppet-lookup: puppet/man/lookup.md
      - puppet-man: puppet/man/man.md
      - puppet-module: puppet/man/module.md
      - puppet-node: puppet/man/node.md
      - puppet-parser: puppet/man/parser.md
      - puppet-plugin: puppet/man/plugin.md
      - puppet-report: puppet/man/report.md
      - puppet-resource: puppet/man/resource.md
      - puppet-script: puppet/man/script.md
      - puppet-ssl: puppet/man/ssl.md
      - puppet-status: puppet/man/status.md
    - Resource Types Reference:
      - Overview: puppet/types/index.md
      - exec: puppet/types/exec.md
      - file: puppet/types/file.md
      - filebucket: puppet/types/filebucket.md
      - group: puppet/types/group.md
      - notify: puppet/types/notify.md
      - package: puppet/types/package.md
      - resources: puppet/types/resources.md
      - schedule: puppet/types/schedule.md
      - service: puppet/types/service.md
      - stage: puppet/types/stage.md
