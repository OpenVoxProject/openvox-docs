      - Environment: puppet/http_api/http_environment.md
      - Environments: puppet/http_api/http_environments.md
      - Facts: puppet/http_api/http_facts.md
      - File Bucket: puppet/http_api/http_file_bucket_file.md
      - File Content: puppet/http_api/http_file_content.md
      - File Metadata: puppet/http_api/http_file_metadata.md
      - Node: puppet/http_api/http_node.md
      - Report: puppet/http_api/http_report.md
      - PSON: puppet/http_api/pson.md
    - Ruby API (YARD): puppet/yard/index.md
    - Reference Fragments:
      - Environment Conf Settings: puppet/_environment_conf_settings.md
      - Hiera Context Object: puppet/_hiera_context_object.md
      - Hiera Options Hash: puppet/_hiera_options_hash.md
