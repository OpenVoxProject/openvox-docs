---
# Ported from upstream Puppet Bolt docs. The mechanical violations (trailing
# spaces, blank-line spacing, list markers, emphasis style, etc.) were fixed in
# the Phase 1 auto-fix pass for
# https://github.com/OpenVoxProject/openvox-docs/issues/199.
#
# `extends` inherits the repo-root config (line length, allowed inline HTML,
# single-title/duplicate-heading handling) so this file only needs to layer on
# the suppressions below. Each remaining rule requires human judgment and is
# addressed in a later phase; remove it from this file as its phase lands. When
# none remain, delete this file entirely.
extends: ../../.markdownlint.yaml

# MD040: fenced code blocks without a language specifier
fenced-code-language: false

# MD036: bold/italic used as informal headings
no-emphasis-as-heading: false

# MD033: inline HTML beyond what the root config permits
no-inline-html: false

# MD055: inconsistent table pipe style
table-pipe-style: false

# MD013: lines exceeding the 210-char root limit
line-length: false

# MD045: images without alt text
no-alt-text: false

# MD032: lists not surrounded by blank lines (residual edge cases)
blanks-around-lists: false

# MD031: fenced code blocks missing surrounding blank lines (residual edge cases)
blanks-around-fences: false

# MD056: inconsistent column count across table rows
table-column-count: false

# MD028: blank line inside block quote
no-blanks-blockquote: false
