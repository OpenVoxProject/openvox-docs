---
name: Build Website

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from'
        type: string
        required: true
        default: 'master'
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to build from'
        type: string
        required: true
    outputs:
      tag:
        description: 'Archive tag generated by build'
        value: '${{ jobs.setup.outputs.tag }}'

permissions:
  contents: read
  packages: write

jobs:
  setup:
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      archive: '${{ steps.set-params.outputs.archive }}'
      name: '${{ steps.set-params.outputs.name }}'
      repo: '${{ steps.set-params.outputs.repo }}'
      tag: '${{ steps.set-params.outputs.tag }}'

    steps:
      - uses: actions/checkout@v7
        with:
          ref: '${{ inputs.ref }}'
          fetch-depth: 1

      - name: Set Project Params
        id: set-params
        run: |
          TAG="$(date +'%Y%m%d')-g$(git log --format=%h --max-count=1 |tr -d '\n')"
          # This variable expansion downcases the "org/repo" github repository
          # string as Docker registries do not allow uppercase in namespace segments.
          REPO="${GITHUB_REPOSITORY,,}"
          NAME="$(basename $REPO)"
          ARCHIVE="${NAME}_${TAG}.tar.xz"

          printf 'archive=%s\n' "$ARCHIVE" | tee -a $GITHUB_OUTPUT
          printf 'name=%s\n' "$NAME" | tee -a $GITHUB_OUTPUT
          printf 'repo=%s\n' "$REPO" | tee -a $GITHUB_OUTPUT
          printf 'tag=%s\n' "$TAG" | tee -a $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-24.04
    # references:all clones and generates docs for three products and the
    # component-version tasks make live GitHub API calls, so the build is network-
    # variable and runs ~5 min; give headroom above the previous tight 5-min cap.
    timeout-minutes: 10
    needs:
      - setup
    env:
      ARCHIVE: '${{ needs.setup.outputs.archive }}'

    steps:
      - uses: actions/checkout@v7
        with:
          ref: '${{ inputs.ref }}'
          fetch-depth: 1
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Install pandoc and mandoc
        run: |
          sudo apt install -y pandoc mandoc
      - name: Build website
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          # Build each product/version's reference docs from the pin table in
          # _data/products.yml into its collection (see `rake references:all`).
          bundle exec rake references:all INSTALLPATH=docs
          # Refresh the component-version tables (agent, server, openvoxdb) from
          # upstream pins. Each falls back to its committed _data file if the
          # GitHub API is unreachable, so a transient failure never breaks the build.
          bundle exec rake references:agent_versions || echo 'agent_versions refresh failed; using committed _data'
          bundle exec rake references:server_versions || echo 'server_versions refresh failed; using committed _data'
          bundle exec rake references:openvoxdb_versions || echo 'openvoxdb_versions refresh failed; using committed _data'
          bundle exec rake references:openbolt_versions || echo 'openbolt_versions refresh failed; using committed _data'
          # Refresh the supported-platforms table from the shared-actions
          # platforms.json, falling back to the committed _data file if unreachable.
          bundle exec rake references:supported_platforms || echo 'supported_platforms refresh failed; using committed _data'
          bundle exec jekyll build
      - name: Archive website
        run: |
          root_dir="${ARCHIVE%%.tar.xz}"
          mv _site "$root_dir"

          tar -cJf "$ARCHIVE" "$root_dir"

      - uses: oras-project/setup-oras@v2
      - name: ORAS Login
        run: |
          printf '%s\n' "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u github
      - name: ORAS Push
        run:
          oras push ghcr.io/${{ needs.setup.outputs.repo }}/${{ needs.setup.outputs.name }}:${{ needs.setup.outputs.tag }} --artifact-type application/x-gtar "$ARCHIVE"
