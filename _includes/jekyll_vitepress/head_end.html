<script src="/assets/js/tabs.js"></script>
<link rel="stylesheet" href="/assets/css/tabs.css">
<link rel="stylesheet" href="/assets/css/custom.css">

<script defer>
  window.addEventListener('load', (event) => {
    jekyllTabs.init({
      activateTabFromUrl: true,
      syncTabsWithSameLabels: true,
    });
  });
</script>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@{{ site.data.package.dependencies.mermaid }}/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false });

  function renderMermaid() {
    const blocks = document.querySelectorAll('pre > code.language-mermaid');
    if (blocks.length === 0) return;
    blocks.forEach((el) => {
      const div = document.createElement('pre');
      div.className = 'mermaid';
      div.textContent = el.textContent;
      el.parentElement.replaceWith(div);
    });
    mermaid.run();
  }

  document.addEventListener('turbo:load', renderMermaid);
  window.addEventListener('load', renderMermaid);
</script>
